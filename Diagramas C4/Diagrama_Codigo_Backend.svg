<text class="code" x="60" y="172">+ findOne(id) · @Get(':id')</text>
<text class="code" x="60" y="189">+ create(dto: CreateCitaDto) · @Post()</text>
<text class="code" x="60" y="206">+ update(id, dto) / remove(id) · @Put @Delete</text>

