<!-- CitasService -->
<rect x="40" y="250" width="600" height="160" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="th" x="60" y="275" fill="#085041">CitasService</text>
<text class="ts" x="60" y="293" fill="#0F6E56">@Injectable() · service/citas.service.ts · reglas de negocio</text>
<line x1="60" y1="305" x2="620" y2="305" stroke="#0F6E56" stroke-width="0.3" opacity="0.4"/>
<text class="code" x="60" y="325">+ create(dto) -- llama assertNoConflict antes de persistir</text>
<text class="code" x="60" y="342">+ update(id, dto) -- revalida si cambia fecha/hora/vet/mascota</text>
<text class="code" x="60" y="359">+ findOne(id) -- lanza NotFoundException si no existe</text>
<text class="code" x="60" y="380">— assertNoConflict() · metodo privado</text>
<text class="code" x="80" y="397">lanza ConflictException con mensaje legible</text>

<line x1="340" y1="410" x2="340" y2="445" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
